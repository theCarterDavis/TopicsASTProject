name: AST Parse Changed Files

on:
  push:

jobs:
  parse-changed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build Docker image
        run: docker build -t ast-parser .

      - name: Find changed Python files and compare ASTs
        run: |
          # Determine the parent commit.
          # For the very first commit there is no parent, so we handle that.
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            PARENT=$(git rev-parse HEAD~1)
          else
            echo "No parent commit — this is the initial commit. Nothing to compare."
            exit 0
          fi

          CURRENT=$(git rev-parse HEAD)
          echo "Comparing $PARENT -> $CURRENT"

          # Get the list of Python files that changed between the two commits
          CHANGED=$(git diff --name-only --diff-filter=ACM "$PARENT" "$CURRENT" -- '*.py')

          if [ -z "$CHANGED" ]; then
            echo "No Python files changed."
            exit 0
          fi

          echo "Changed Python files:"
          echo "$CHANGED"
          echo "=============================="

          for FILE in $CHANGED; do
            echo ""
            echo "=========================================="
            echo "  FILE: $FILE"
            echo "=========================================="

            # --- If both old and new versions exist, run the comparison ---
            if git show "$PARENT:$FILE" > /tmp/old_version.py 2>/dev/null; then
              cp "$FILE" /tmp/new_version.py

              echo ""
              echo "Running AST comparison (old vs new) ..."
              docker run --rm \
                -v /tmp/old_version.py:/app/old_version.py \
                -v /tmp/new_version.py:/app/new_version.py \
                ast-parser compare.py old_version.py new_version.py
            else
              # Newly added file — no old version to compare against
              echo "(file did not exist in parent commit — showing AST only)"
              echo ""
              docker run --rm \
                -v "$(pwd)/$FILE:/app/target.py" \
                ast-parser parse.py target.py
            fi

          done

